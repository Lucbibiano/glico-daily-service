version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: glicodailydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    network_mode: host
    env_file: .env
    environment:
      DATABASE_HOST: 127.0.0.1
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: glicodailydb
      APP_PASSWORD: ${APP_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: development
    volumes:
      - ./:/app
    command: npm run start:dev start:debug
    ports:
      - "3002:3002"
      - "9229:9229"

volumes:
  db_data:
